Política de Privacidad de Pivot Entrenamiento Personalizado
Última actualización: 04/01/2024
Esta Política de Privacidad describe cómo Pivot Entrenamiento Personalizado ("nosotros", "nuestro/a" o "la Aplicación") recopila, utiliza y protege tu información personal cuando utilizas nuestra aplicación.

1. Información Recopilada
1.1. Información Personal:
Recopilamos información personal que proporcionas voluntariamente al registrarte o utilizar nuestra aplicación, como tu nombre, dirección de correo electrónico y preferencias de entrenamiento.
1.2. Información de Uso:
Recopilamos información sobre cómo interactúas con nuestra aplicación, como las rutinas de entrenamiento seleccionadas, la duración de las sesiones y el rendimiento durante los ejercicios.

2. Uso de la Información
2.1. Personalización de Contenido:
Utilizamos la información recopilada para personalizar las rutinas de entrenamiento y el contenido de la aplicación según tus preferencias y objetivos.
2.2. Mejora del Servicio:
Utilizamos la información para analizar el rendimiento de la aplicación, identificar áreas de mejora y desarrollar nuevas funcionalidades.

3. Compartir Información con Terceros
No compartimos tu información personal con terceros sin tu consentimiento expreso, a menos que estemos legalmente obligados a hacerlo.

4. Seguridad de la Información
Implementamos medidas de seguridad para proteger tu información personal contra accesos no autorizados, alteraciones, divulgación o destrucción no autorizada.

5. Cookies y Tecnologías Similares
No utilizamos cookies ni tecnologías similares para recopilar información personal.

6. Menores de Edad
Nuestra aplicación no está dirigida a menores de 13 años. No recopilamos intencionalmente información personal de menores de esa edad.

7. Cambios en la Política de Privacidad
Nos reservamos el derecho de actualizar o cambiar nuestra política de privacidad en cualquier momento. La fecha de la última actualización se indica al principio de la política.

8. Contacto
Si tienes preguntas sobre nuestra política de privacidad, contáctanos en damianfelix22@gmail.com

    <script>
      function escapeHTML(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function markdownToHtml(md) {
        const lines = md.split("\n");
        let html = "";
        let inList = false;

        for (let line of lines) {
          const trimmed = line.trim();

          if (trimmed.match(/^#{1,6}\s+/)) {
            if (inList) { html += "</ul>"; inList = false; }
            const level = trimmed.match(/^#+/)[0].length;
            html += `<h${level}>${escapeHTML(trimmed.replace(/^#{1,6}\s+/, ""))}</h${level}>`;
          } else if (trimmed.match(/^[-*+]\s+/)) {
            if (!inList) { html += "<ul>"; inList = true; }
            html += `<li>${escapeHTML(trimmed.replace(/^[-*+]\s+/, ""))}</li>`;
          } else if (!trimmed) {
            if (inList) { html += "</ul>"; inList = false; }
            html += "<br>";
          } else {
            if (inList) { html += "</ul>"; inList = false; }
            html += `<p>${escapeHTML(trimmed)}</p>`;
          }
        }

        if (inList) html += "</ul>";
        return html;
      }

      function load() {
        const contentEl = document.getElementById("content");
        const md = document.getElementById("md-source")?.textContent || "";
        if (!md.trim()) {
          contentEl.innerHTML = "<p>Documento no disponible.</p>";
          return;
        }
        contentEl.innerHTML = markdownToHtml(md);
      }

      load();
    </script>
