Términos y Condiciones de Uso de Pivot Entrenamiento Personalizado

Bienvenido/a a Pivot Entrenamiento Personalizado ("nosotros", "nuestro/a" o "la Aplicación"). Al utilizar nuestra aplicación, aceptas cumplir con los siguientes términos y condiciones. Por favor, revisa detenidamente antes de usar nuestra aplicación.

1. Descripción del Servicio

2. Suscripciones y Pagos

3. Cancelación de Suscripciones

5. Modificaciones en los Términos y Condiciones

7. Contacto

    <script>
      function escapeHTML(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function markdownToHtml(md) {
        const lines = md.split("\n");
        let html = "";
        let inList = false;

        for (let line of lines) {
          const trimmed = line.trim();

          if (trimmed.match(/^#{1,6}\s+/)) {
            if (inList) { html += "</ul>"; inList = false; }
            const level = trimmed.match(/^#+/)[0].length;
            html += `<h${level}>${escapeHTML(trimmed.replace(/^#{1,6}\s+/, ""))}</h${level}>`;
          } else if (trimmed.match(/^[-*+]\s+/)) {
            if (!inList) { html += "<ul>"; inList = true; }
            html += `<li>${escapeHTML(trimmed.replace(/^[-*+]\s+/, ""))}</li>`;
          } else if (!trimmed) {
            if (inList) { html += "</ul>"; inList = false; }
            html += "<br>";
          } else {
            if (inList) { html += "</ul>"; inList = false; }
            html += `<p>${escapeHTML(trimmed)}</p>`;
          }
        }

        if (inList) html += "</ul>";
        return html;
      }

      function load() {
        const contentEl = document.getElementById("content");
        const md = document.getElementById("md-source")?.textContent || "";
        if (!md.trim()) {
          contentEl.innerHTML = "<p>Documento no disponible.</p>";
          return;
        }
        contentEl.innerHTML = markdownToHtml(md);
      }

      load();
    </script>
